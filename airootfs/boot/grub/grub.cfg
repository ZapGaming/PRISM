# 🌈 PRISM OS v3.0
set timeout=3
set default=0

menuentry "🌈 Try PRISM OS" {
    linux /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisolabel=PRISM
    initrd /arch/boot/x86_64/initramfs-linux.img
}

menuentry "🔧 Safe Mode" {
    linux /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisolabel=PRISM nomodeset
    initrd /arch/boot/x86_64/initramfs-linux.img
}
