# Crystal Linux 🎨🔮
# Kitty Terminal Config - Glass Effect
# ==================================

# Font Configuration
font_family      JetBrains Mono Nerd Font
bold_font        JetBrains Mono Nerd Font Bold
italic_font      JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic

font_size 12.0
disable_ligatures never

# Window Appearance
background_opacity 0.92
background #1a1b26
foreground #c0caf5

# Crystal Color Palette
color0  #414868
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #c0caf5
color8  #565f89
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Window Geometry
remember_window_size yes
initial_window_width  100c
initial_window_height 30c
window_padding_width 8
window_margin_width 4

# Tab Bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_background #1a1b26
active_tab_background #7aa2f7
active_tab_foreground #1a1b26
inactive_tab_background #414868
inactive_tab_foreground #c0caf5

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval 0 ease ease-out

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

# Performance
sync_to_monitor yes
repaint_delay 10
input_delay 3

# Cursor text
cursor_text_color #1a1b26

# URL handling
url_color #7aa2f7
url_style curly
open_url_modifiers kitty_mod

# Shell
shell zsh

# Bell
enable_audio_bell no
window_alert_on_bell yes

# Advanced
allow_hyperlinks yes
allow_remote_control yes
listen_on unix:/tmp/kitty
term xterm-kitty
