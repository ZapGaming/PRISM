# ⚡ PRISM OS 🌈
# Main Configuration File
# =======================

# Display
PRISM_WALLPAPER="/home/$(whoami)/.config/prism/wallpapers/default.png"
PRISM_THEME="dark"
PRISM_GAPS=18
PRISM_ANIMATIONS=true

# Effects
PRISM_GLASS_LEVEL=0.8
PRISM_BLUR_STRENGTH=12
PRISM_CORNER_RADIUS=16
PRISM_ANIMATION_SPEED=0.15

# VM Detection
if [ -d /etc/vmware ]; then
    PRISM_VM_MODE=true
    PRISM_ANIMATIONS=false  # Disable for VMs
fi

# Laptop detection
if [ -d /sys/class/power_supply/BAT0 ]; then
    PRISM_LAPTOP=true
fi

# Export for scripts
export PRISM_WALLPAPER PRISM_THEME PRISM_GAPS
export PRISM_ANIMATIONS PRISM_GLASS_LEVEL
export PRISM_BLUR_STRENGTH PRISM_CORNER_RADIUS
export PRISM_VM_MODE PRISM_LAPTOP
