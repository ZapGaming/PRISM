# ⚡ PRISM OS 🌈
# Picom Configuration - FULL ANIMATIONS + GLASS
# ================================================

# ═══════════════════════════════════════════════════
# BACKEND & PERFORMANCE
# ═══════════════════════════════════════════════════
backend = "glx"
vsync = true
refresh-rate = 0
glx-no-stencil = true
glx-no-rebind-pixmap = true
use-damage = true

# ═══════════════════════════════════════════════════
# ANIMATIONS (Prismatic Effects)
# ═══════════════════════════════════════════════════

# Window open/close/scale animations
animations = true

# Fade effect (subtle glass transition)
fade = true
fade-in-step = 0.06
fade-out-step = 0.06
fade-delta = 8

# Slide animations for window movement
wintypes:
{
  menu        = { fade = true; shadow = false; }
  popup_menu  = { fade = true; shadow = false; }
  dropdown_menu = { fade = true; shadow = false; }
  dialog      = { fade = true; shadow = true; }
  normal      = { fade = true; shadow = true; }
  tooltip     = { fade = true; shadow = false; }
  utility     = { fade = false; shadow = false; }
}

# ═══════════════════════════════════════════════════
# CORNERS (Prismatic Rounded)
# ═══════════════════════════════════════════════════
# Requires picom-ibhagwan fork for dual_kawase
corner-radius = 16
rounded-corners-exclude = [
  "window_type = 'dock'",
  "class_g = 'Polybar'",
  "class_g = 'i3bar'"
]

# ═══════════════════════════════════════════════════
# BLUR (Deep Glass Effect)
# ═══════════════════════════════════════════════════
blur-method = "dual_kawase"
blur-strength = 12
blur-background = true
blur-background-frame = true
blur-background-fixed = true

# Exclude blur for performance
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'chromium'"
]

# ═══════════════════════════════════════════════════
# SHADOWS (Subtle depth)
# ═══════════════════════════════════════════════════
shadow = true
shadow-radius = 18
shadow-offset-x = -12
shadow-offset-y = -12
shadow-opacity = 0.42

shadow-color = "#000000"
shadow-exclude = [
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
  "_GTK_FRAME_EXTENTS@:c"
]

# ═══════════════════════════════════════════════════
# MISC
# ═══════════════════════════════════════════════════
mark-wmwin-focused = true
mark-ovredir-focused = true
detect-client-opacity = true
unredir-if-possible = true

# Focus
focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'Rofi'"
]

# Log
log-level = "warn"
