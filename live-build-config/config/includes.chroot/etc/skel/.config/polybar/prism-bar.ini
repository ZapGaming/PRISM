; 🌈 PRISM OS Polybar - Prismatic Edition
[global/wm]
margin-top = 0
margin-bottom = 0

[colors]
background = #1a1b26cc
background-alt = #24283bcc
foreground = #c0caf5
primary = #7aa2f7
secondary = #bb9af7
alert = #f7768e
disabled = #565f89

[bar/prism]
width = 100%
height = 32pt
radius = 8
cursor-click = pointer
cursor-scroll = ns-resize

background = \${colors.background}
foreground = \${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = \${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=11;2
font-1 = FontAwesome:size=12;2

modules-left = i3 xwindow
modules-right = filesystem pulseaudio memory cpu date

enable-ipc = true

tray-position = right
tray-padding = 2
wm-restack = i3

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-mode-padding = 1
label-mode-background = \${colors.alert}
label-focused = %index%
label-focused-background = \${colors.background-alt}
label-focused-underline = \${colors.primary}
label-focused-padding = 1
label-occupied = %index%
label-occupied-padding = 1
label-urgent = %index%
label-urgent-background = \${colors.alert}
label-urgent-padding = 1
label-empty = %index%
label-empty-foreground = \${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%

[module/filesystem]
type = internal/fs
mount-0 = /
label-mounted = %{F#bb9af7}󰋚%{F-} %free%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "%{F#7aa2f7}󰕾%{F-} "
format-volume-prefix-foreground = \${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = \${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "%{F#bb9af7}󰍛%{F-} "
format-prefix-foreground = \${colors.secondary}
label = %used%/%total%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "%{F#7aa2f7}󰘑%{F-} "
format-prefix-foreground = \${colors.primary}
label = %percentage%%

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d%
time = %H:%M
date-alt = %Y-%m-%d
time-alt = %H:%M:%S
format-prefix = "%{F#bb9af7}󰥔%{F-} "
format-prefix-foreground = \${colors.secondary}
label = %time%

[settings]
screenchange-reload = true
pseudo-transparency = true
