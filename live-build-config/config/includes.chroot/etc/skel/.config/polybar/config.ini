; ⚡ PRISM OS 🌈
; Polybar Config - GLASS + NEON + ANIMATIONS
; ==========================================

[global/wm]
margin-top = 0
margin-bottom = 0

[colors]
; Prism color palette
background    = #1a1b26cc
background-alt = #24283bdd
foreground    = #c0caf5
font-light    = #a9b1d6
accent-blue   = #7aa2f7
accent-purple = #bb9af7
accent-cyan   = #7dcfff
accent-green  = #9ece6a
accent-orange = #ff9e64
accent-pink   = #ff007c
accent-red    = #f7768e

; Transparent variants
crystal-1 = #565f8966
crystal-2 = #41486899
crystal-3 = #1a1b26dd

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 36
cursor-click = pointer
cursor-scroll = ns-resize

; Glass effect background
background = ${colors.background}
foreground = ${colors.foreground}

; Rounded corners on bar
radius = 0

; Padding
padding-left = 4
padding-right = 4
module-margin = 8

tray-position = right
tray-padding = 8
tray-maxsize = 20
transparent = true

; Font configuration
font-0 = JetBrainsMono Nerd Font:size=10;4
font-1 = Font Awesome 6 Free:size=10;4
font-2 = Unifont:size=11;4

; Left modules
modules-left = i3 xwindow

; Center modules
modules-center = 

; Right modules - the PRISMATIC side
modules-right = pulseaudio memory cpu eth temperature date powermenu

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; MODULES - PRISM EDITION
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

; Workspace colors with PRISM gradient feeling
ws-icon-0 = 1;;
ws-icon-1 = 2;󰨞
ws-icon-2 = 3;%
ws-icon-3 = 4;󰭹
ws-icon-4 = 5;󱓧
ws-icon-5 = 6;󰝚
ws-icon-6 = 7;
ws-icon-7 = 8;󰊴
ws-icon-8 = 9;󰓏
ws-icon-9 = 10;󰺄

; Format
format = <label-state>
label-focused = %icon%
label-focused-foreground = ${colors.accent-cyan}
label-focused-background = ${colors.crystal-2}
label-focused-padding = 8
label-unfocused = %icon%
label-unfocused-foreground = ${colors.font-light}
label-unfocused-padding = 8
label-visible = %icon%
label-visible-foreground = ${colors.accent-purple}
label-visible-padding = 8
label-urgent = %icon%
label-urgent-foreground = ${colors.accent-red}
label-urgent-background = ${colors.crystal-2}
label-urgent-padding = 8

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%
label-maxlen = 30
label-empty = " Prism OS "

[module/pulseaudio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_00_1f.3.analog-stereo

format-volume = <label-volume>
label-volume =  󰕾 %{A1:pavucontrol:} %percentage%% %{A}
label-volume-foreground = ${colors.foreground}

label-muted =  󰖁 %{A1:pavucontrol:} muted %{A}
label-muted-foreground = ${colors.accent-red}

click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 2

; Animated memory bar
format = <label> <bar-used>
label =  󰍛

bar-used-indicator = 
bar-used-fill = ━
bar-used-empty = ━
bar-used-width = 8
bar-used-foreground-0 = ${colors.accent-green}
bar-used-foreground-1 = ${colors.accent-orange}
bar-used-foreground-2 = ${colors.accent-red}
bar-used-empty-foreground = ${colors.crystal-1}

[module/cpu]
type = internal/cpu
interval = 0.5

; CPU with sparkline feel
format = <label> <ramp-load>
label =  

ramp-load-0 = ▁
ramp-load-1 = ▂
ramp-load-2 = ▃
ramp-load-3 = ▄
ramp-load-4 = ▅
ramp-load-5 = ▆
ramp-load-6 = ▇
ramp-load-7 = █

ramp-load-foreground-0 = ${colors.accent-green}
ramp-load-foreground-1 = ${colors.accent-green}
ramp-load-foreground-2 = ${colors.accent-cyan}
ramp-load-foreground-3 = ${colors.accent-cyan}
ramp-load-foreground-4 = ${colors.accent-blue}
ramp-load-foreground-5 = ${colors.accent-purple}
ramp-load-foreground-6 = ${colors.accent-orange}
ramp-load-foreground-7 = ${colors.accent-red}

[module/eth]
type = internal/network
interface = eth0
interval = 3.0

format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected =  󰇚 %{A1:alacritty -e nmtui:} %local_ip% %{A}
label-connected-foreground = ${colors.accent-green}
label-disconnected =  󰇙
label-disconnected-foreground = ${colors.accent-red}

[module/temperature]
type = internal/temperature
thermal-zone = 0
base-temperature = 20
warn-temperature = 60
units = true

; Temperature with color gradient
format = <label>
format-warn = <label-warn>
label =  󰔏 %temperature-c%
label-warn =  󰈸 %temperature-c%
label-warn-foreground = ${colors.accent-orange}

[module/date]
type = internal/date
interval = 1

; PRISM clock
date = %H:%M

;%{A3:zenity --calendar:}
label =  󰥔 %{A1:gnome-calendar:} %date% %{A}

[module/powermenu]
type = custom/menu

label-open =  󰐥
label-open-foreground = ${colors.accent-purple}
label-close = 󰅸
label-close-foreground = ${colors.accent-pink}
label-separator = │
label-separator-foreground = ${colors.crystal-1}

menu-0-0 = 󰍃 logout
menu-0-0-exec = i3-msg exit
menu-0-1 = 󰑓 reboot
menu-0-1-exec = systemctl reboot
menu-0-2 = 󰤆 power off
menu-0-2-exec = systemctl poweroff
