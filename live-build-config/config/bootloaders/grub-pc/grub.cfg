# GRUB config for PRISM OS
set default="0"
set timeout=10

set gfxmode=auto
loadfont unicode

set theme=($root)/boot/grub/theme.txt

menuentry "🌈 PRISM OS (Live)" {
    linux /live/vmlinuz root=/dev/ram0 boot=live components
    initrd /live/initrd.img
}

menuentry "🌈 PRISM OS (Install)" {
    linux /live/vmlinuz root=/dev/ram0 boot=live components debian-installer
    initrd /live/initrd.img
}

menuentry "🔧 Advanced Options" {
    submenu "Advanced" {
        menuentry "Safe Mode" {
            linux /live/vmlinuz root=/dev/ram0 boot=live components nomodeset
            initrd /live/initrd.img
        }
        menuentry "Memory Test" {
            linux16 /boot/memtest86+.bin
        }
    }
}
