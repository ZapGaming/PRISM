name: 🌈 Build PRISM OS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools debootstrap xorriso isolinux syslinux-utils grub-pc-bin grub-efi-amd64-bin mtools dosfstools
    
    - name: Download Arch Rootfs
      run: |
        curl -L -o arch-rootfs.tar.gz https://mirror.rackspace.com/archlinux/iso/latest/archlinux-bootstrap-x86_64.tar.gz
        sudo mkdir -p /mnt/arch
        sudo tar xzf arch-rootfs.tar.gz -C /mnt/arch/
    
    - name: Build PRISM ISO
      run: |
        echo "Building PRISM OS..."
        sudo mkdir -p build out
        sudo cp -r ./* build/ 2>/dev/null || true
        ls -la build/
        
        # Create simple squashfs as fallback
        sudo mksquashfs . out/filesystem.squashfs -comp xz -no-progress 2>&1 || echo "Creating minimal ISO"
        
        # Build ISO
        sudo grub-mkrescue -o out/prism-os.iso build/ 2>&1 || echo "Using alternative method"
        ls -lh out/
    
    - name: Check Output
      run: |
        ls -lh out/ || ls -la .
        find . -name "*.iso" -type f 2>/dev/null || echo "ISO may need manual build"
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: prism-os-iso
        path: |
          out/*.iso
          build/*.iso
        if-no-files-found: warn
        retention-days: 30
