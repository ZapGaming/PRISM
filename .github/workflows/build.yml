name: Build PRISM OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso wget
        
    - name: Download Kernel and Initrd
      run: |
        mkdir -p iso/live
        wget -q http://deb.debian.org/debian/dists/bookworm/main/installer-amd64/current/images/netboot/debian-installer/amd64/linux -O iso/live/vmlinuz
        wget -q http://deb.debian.org/debian/dists/bookworm/main/installer-amd64/current/images/netboot/debian-installer/amd64/initrd.gz -O iso/live/initrd.img
        ls -lh iso/live/
        
    - name: Make GRUB Config
      run: |
        mkdir -p iso/boot/grub
        echo "set timeout=10" > iso/boot/grub/grub.cfg
        echo "" >> iso/boot/grub/grub.cfg
        echo "menuentry PRISM-OS {" >> iso/boot/grub/grub.cfg
        echo "    linux /live/vmlinuz boot=live" >> iso/boot/grub/grub.cfg
        echo "    initrd /live/initrd.img" >> iso/boot/grub/grub.cfg
        echo "}" >> iso/boot/grub/grub.cfg
        cat iso/boot/grub/grub.cfg
        
    - name: Build ISO
      run: |
        mkdir -p out
        grub-mkrescue -o out/prism-os.iso iso/ || echo "ISO build attempted"
        ls -lh out/ || ls -lh iso/
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: PRISM-OS-ISO
        path: out/*.iso
        if-no-files-found: warn
