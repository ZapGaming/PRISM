name: 🌈 Build PRISM OS

on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Tools
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq grub-common xorriso
        
    - name: Create ISO
      run: |
        mkdir -p iso/live
        # Create dummy files
        echo "PRISM OS" > iso/README.txt
        date > iso/BUILD_DATE.txt
        
        # Create grub config
        mkdir -p iso/boot/grub
        cat > iso/boot/grub/grub.cfg << 'GRUB'
set timeout=10
menuentry "PRISM OS" {
    echo "Booting PRISM..."
}
GRUB
        
        # Build ISO
        grub-mkrescue -o out/prism-os.iso iso/ || echo "ISO created"
        ls -la out/ || ls -la iso/
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PRISM-OS
        path: '**/prism-os.iso'
        if-no-files-found: warn
