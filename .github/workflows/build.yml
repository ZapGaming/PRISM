name: 🌈 Build PRISM OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build PRISM ISO
      run: |
        sudo apt-get update
        sudo apt-get install -y grub-pc xorriso isolinux wget
        mkdir -p iso/live iso/boot/grub
        
        # Download kernel
        wget -q http://deb.debian.org/debian/dists/bookworm/main/installer-amd64/current/images/netboot/debian-installer/amd64/linux -O iso/live/vmlinuz
        wget -q http://deb.debian.org/debian-dists/bookworm/main/installer-amd64/current/images/netboot/debian-installer/amd64/initrd.gz -O iso/live/initrd.img
        
        # Create GRUB config
        cat > iso/boot/grub/grub.cfg << 'EOF'
set timeout=5
menuentry "🌈 PRISM OS" { linux /live/vmlinuz boot=live; initrd /live/initrd.img; }
EOF
        
        # Build ISO
        sudo grub-mkrescue -o out/prism-os.iso iso/
        ls -lh out/
        
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: PRISM-OS-ISO
        path: out/prism-os.iso
