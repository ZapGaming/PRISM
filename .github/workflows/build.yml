name: Build PRISM OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y grub-common xorriso
        
    - name: Create ISO Structure
      run: |
        mkdir -p iso/boot/grub
        echo "PRISM OS" > iso/README.txt
        date > iso/BUILD_DATE.txt
        
    - name: Create GRUB Config
      run: |
        echo 'set timeout=10' > iso/boot/grub/grub.cfg
        echo '' >> iso/boot/grub/grub.cfg
        echo 'menuentry \"PRISM OS\" {' >> iso/boot/grub/grub.cfg
        echo '    linux /live/vmlinuz boot=live' >> iso/boot/grub/grub.cfg  
        echo '    initrd /live/initrd.img' >> iso/boot/grub/grub.cfg
        echo '}' >> iso/boot/grub/grub.cfg
        
    - name: Build ISO
      run: |
        mkdir -p out
        grub-mkrescue -o out/prism-os.iso iso/ || true
        ls -la out/ 2>/dev/null || ls -la iso/
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: PRISM-OS
        path: out/*.iso
        if-no-files-found: warn
