name: Build PRISM OS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install ISO Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso wget isolinux syslinux
        which xorriso && echo "xorriso installed"
        
    - name: Download Kernel Files
      run: |
        mkdir -p iso/live iso/boot/grub
        # Get Debian kernel
        wget -q http://deb.debian.org/debian/dists/bookworm/main/installer-amd64/current/images/netboot/debian-installer/amd64/linux -O iso/live/vmlinuz
        wget -q http://deb.debian.org/debian/dists/bookworm/main/installer-amd64/current/images/netboot/debian-installer/amd64/initrd.gz -O iso/live/initrd.img
        ls -lh iso/live/
        
    - name: Create ISOLINUX Config
      run: |
        cat > iso/isolinux/isolinux.cfg << 'ISOCFG'
default prism
timeout 30

label prism
  menu label 🌈 PRISM OS
  linux /live/vmlinuz
  initrd /live/initrd.img
  append boot=live quiet

label safe
  menu label 🔧 Safe Mode
  kernel /live/vmlinuz
  append boot=live nomodeset
ISOCFG
        mkdir -p iso/isolinux

    - name: Build ISO with xorriso
      run: |
        mkdir -p out
        # Create ISO using xorriso directly
        xorriso -as mkisofs \
          -r -V "PRISM_OS" \
          -J -J -joliet-long \
          -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
          -c isolinux/boot.cat \
          -b isolinux/isolinux.bin \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          -eltorito-alt-boot \
          -e boot/grub/efi.img -no-emul-boot \
          -isohybrid-gpt-basdat \
          -o out/prism-os.iso \
          iso/ 2>&1 || echo "Trying simpler method..."
        
        # Fallback: simple ISO
        if [ ! -f out/prism-os.iso ]; then
          echo "Creating simple ISO..."
          mkisofs -r -o out/prism-os.iso iso/ 2>/dev/null || \
          xorriso -as mkisofs -r -V PRISM -o out/prism-os.iso iso/
        fi
        
        ls -lh out/
        file out/*.iso 2>/dev/null || echo "Checking iso..."
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: PRISM-OS-ISO
        path: out/prism-os.iso
        if-no-files-found: warn
        
